name: Build

on:
  push:
    branches: [ "master", "ci", "ci/vs-2026" ]
  pull_request:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug_CI2, Release_CI2]
        platform: [x86, x64, ARM, ARM64]

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    # Build highlight
    - name: Install bun
      uses: oven-sh/setup-bun@v2
    - name: Install highlight dependencies
      working-directory: Highlight
      run: bun install
    - name: Build highlight
      working-directory: Highlight
      run: bun run build-only
    - name: Copy to project directory
      run: copy Highlight\dist\index.html WinUI3Example\Monaco.html

    - name: Set up vcpkg
      working-directory: ${{env.VCPKG_INSTALLATION_ROOT}}
      run: vcpkg integrate install
    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build Debug
      if: matrix.configuration == 'Debug_CI2'
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} ${{env.SOLUTION_FILE_PATH}}

    - name: Create Temporary Certificate
      if: matrix.configuration == 'Release_CI2'
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Peter" -KeyUsage DigitalSignature -FriendlyName "Temporary Certificate" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $password = ConvertTo-SecureString -String "123" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath "${{github.workspace}}\UWPExample\UWPExample_TemporaryKey.pfx" -Password $password

    - name: Build Release
      if: matrix.configuration == 'Release_CI2'
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} ${{env.SOLUTION_FILE_PATH}} -p:GenerateAppxPackageOnBuild=true -p:AppxPackageSigningEnabled=true -p:UapAppxPackageBuildMode=SideloadOnly -p:AppxPackagePublisher="CN=Peter" -p:PackageCertificateKeyFile="${{github.workspace}}\UWPExample\UWPExample_TemporaryKey.pfx" -p:PackageCertificatePassword="123"

    - name: Copy SideloadReadme
      if: github.event_name == 'push' && matrix.configuration == 'Release_CI2'
      run: copy SideloadReadme.md AppPackages\SideloadReadme.md

    - name: Zip Archive
      if: github.event_name == 'push' && matrix.configuration == 'Release_CI2'
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: Compress-Archive -Path "AppPackages" -DestinationPath "WinUIEssential.Example(${{ matrix.platform }}).zip"
      shell: pwsh

    - name: Set tag
      if: github.event_name == 'push' && matrix.configuration == 'Release_CI2'
      id: set-tag
      run: |
        $out = Get-Date -format "yyyy.MM.dd.HH"
        echo tag=$out >> $env:GITHUB_OUTPUT

    - name: Release
      if: github.event_name == 'push' && matrix.configuration == 'Release_CI2'
      env:
        tag: ${{steps.set-tag.outputs.tag}}
      uses: softprops/action-gh-release@v2
      with:
        files: WinUIEssential.Example(${{ matrix.platform }}).zip
        tag_name: ${{steps.set-tag.outputs.tag}}
